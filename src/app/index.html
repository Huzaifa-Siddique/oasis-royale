<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniDoc AR MVP</title>
    <!-- Yeh line internet se 3D chalane ki taqat leti hai -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; }
        model-viewer { width: 100%; height: 90vh; }
    </style>
</head>
<body>

    <!-- Yeh tag screen par 3D Astronaut dikhayega aur uspar ek button lagayega -->
    <model-viewer src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" ar camera-controls auto-rotate>
        <button slot="hotspot-1" data-position="0m 1.75m 0.22m" data-normal="0m 0m 1m" style="background: #007bff; color: white; border: none; padding: 8px; border-radius: 5px; font-weight: bold;">
            Step 1: Oxygen Check

        </button>
    </model-viewer>

    
</body>
</html>
